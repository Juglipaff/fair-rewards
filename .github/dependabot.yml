version: 2
updates:
  # GitHub Actions used in workflows
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      actions:
        patterns:
          - "*"

  # npm devDependencies (prettier, prettier-plugin-solidity)
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    versioning-strategy: increase
    groups:
      dev-dependencies:
        dependency-type: development
