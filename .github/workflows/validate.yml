name: Validate

permissions: {}

on:
  pull_request:
  workflow_dispatch:
  workflow_call:
    inputs:
      ref:
        required: false
        type: string

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ inputs.ref }}
          persist-credentials: false

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable

      - name: forge fmt --check
        run: forge fmt --check

  abi:
    name: ABI
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ inputs.ref }}
          persist-credentials: false
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable

      - name: Verify committed ABIs match source
        run: |
          scripts/extract-abi.sh src abi.check
          diff -r abi abi.check

  test:
    name: Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ inputs.ref }}
          persist-credentials: false
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable

      - name: Run Forge tests (with gas snapshot check)
        env:
          FOUNDRY_PROFILE: ci
        run: forge test -vvv

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    permissions:
      contents: read
      statuses: write
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ inputs.ref }}
          persist-credentials: false
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable

      - name: Run Forge coverage
        run: forge coverage --report lcov

      - name: Mark coverage pending
        if: github.event_name == 'push' || github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
          SHA: ${{ github.event.pull_request.head.sha || github.sha }}
        run: |
          gh api "repos/${{ github.repository }}/statuses/${SHA}" \
            -f state=pending \
            -f context="coverage/coveralls (${{ github.event_name }})" \
            -f description="Waiting for Coveralls to process..."

      - name: Upload coverage to Coveralls
        uses: coverallsapp/github-action@v2
        with:
          file: ./lcov.info
          format: lcov
