name: CI

permissions: {}

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable

      - name: forge fmt --check
        run: forge fmt --check

  test:
    name: Foundry tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable

      - name: Run Forge tests (with gas snapshot check)
        env:
          FOUNDRY_PROFILE: ci
        run: forge test -vvv

      - name: Run Forge coverage
        run: forge coverage --report lcov

      - name: Upload coverage to Coveralls
        uses: coverallsapp/github-action@v2
        with:
          file: ./lcov.info
          format: lcov
